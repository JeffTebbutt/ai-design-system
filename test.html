<!DOCTYPE html>
<html>
  <head>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <style>
      body {
        font-family: "Euclid Circular A", sans-serif;
      }
    </style>

    <!-- Load generated Tailwind config -->
    <script>
      fetch("../meta/tailwind.generated.json")
        .then((res) => res.json())
        .then((config) => {
          tailwind.config = config;
        })
        .catch((err) => {
          console.error("❌ Failed to load Tailwind config", err);
        });
    </script>
  </head>

  <body class="p-10 space-x-4">
    <!-- Default state -->
    <button
      class="px-large h-7xl min-w-9xl rounded-full bg-surface-primary text-on-surface-primary"
    >
      Default
    </button>

    <!-- Hover state preview (forced) -->
    <button
      class="px-large h-7xl min-w-9xl rounded-full bg-surface-primary-weak text-on-surface-primary"
    >
      Hover
    </button>

    <!-- Real hover interaction -->
    <button
      class="px-large h-7xl min-w-9xl rounded-full bg-surface-primary text-on-surface-primary hover:bg-surface-primary-weak"
    >
      Hover (interactive)
    </button>
  </body>
</html>
